name: Deploy to easyname (FTPS)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ftp-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Mapped here so the deploy step can skip itself until the secrets are set,
    # avoiding a failed run on the first push.
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTPS
        if: ${{ env.FTP_SERVER != '' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          # Target folder on the webspace; set the repo variable FTP_SERVER_DIR
          # (e.g. /, /yttomp3.kentser.com/ or whatever easyname maps the subdomain to).
          server-dir: ${{ vars.FTP_SERVER_DIR || './' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
