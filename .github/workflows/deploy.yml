name: Deploy to easyname (SFTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sftp-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Mapped here so the deploy step can skip itself until the secrets are set,
    # avoiding a failed run before credentials exist.
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site files
        if: ${{ env.FTP_SERVER != '' }}
        run: |
          mkdir -p _site
          cp index.html _site/

      - name: Deploy via SFTP
        if: ${{ env.FTP_SERVER != '' }}
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # easyname uses a per-account SSH/SFTP port (not 22); set via repo variable.
          port: ${{ vars.SFTP_PORT || '22' }}
          local_path: './_site/*'
          # Target folder on the webspace; set the repo variable FTP_SERVER_DIR
          # to the subdomain's document root (e.g. /yttomp3.kentser.com/).
          remote_path: ${{ vars.FTP_SERVER_DIR || '.' }}
          sftp_only: true
