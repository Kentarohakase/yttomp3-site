name: Deploy to easyname (SFTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sftp-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Mapped here so the deploy steps skip themselves until the secrets are set.
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site files
        if: ${{ env.FTP_SERVER != '' }}
        run: |
          mkdir -p _site
          cp index.html _site/

      - name: Ensure remote directory exists
        if: ${{ env.FTP_SERVER != '' }}
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
          SFTP_HOST: ${{ secrets.FTP_SERVER }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PORT: ${{ vars.SFTP_PORT }}
          REMOTE_DIR: ${{ vars.FTP_SERVER_DIR }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y sshpass >/dev/null
          # '-mkdir' ignores the error if the directory already exists.
          printf -- '-mkdir %s\n' "$REMOTE_DIR" > /tmp/mk.sftp
          sshpass -e sftp -P "$SFTP_PORT" -oStrictHostKeyChecking=no -oBatchMode=no -b /tmp/mk.sftp "$SFTP_USER@$SFTP_HOST" || true

      - name: Deploy via SFTP
        if: ${{ env.FTP_SERVER != '' }}
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # easyname uses a per-account SSH/SFTP port (not 22); set via repo variable.
          port: ${{ vars.SFTP_PORT || '22' }}
          local_path: './_site/*'
          # Target folder on the webspace (relative to the SSH home), e.g.
          # html/yttomp3.kentser.com. Point the easyname subdomain at this folder.
          remote_path: ${{ vars.FTP_SERVER_DIR || '.' }}
          sftp_only: true

      - name: Fix remote permissions
        if: ${{ env.FTP_SERVER != '' }}
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
          SFTP_HOST: ${{ secrets.FTP_SERVER }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PORT: ${{ vars.SFTP_PORT }}
          REMOTE_DIR: ${{ vars.FTP_SERVER_DIR }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y sshpass >/dev/null
          # The webserver (www-data) must be able to traverse the dir and read the files.
          {
            printf -- 'chmod 755 %s\n' "$REMOTE_DIR"
            printf -- 'chmod 644 %s/index.html\n' "$REMOTE_DIR"
            printf -- 'ls -la %s\n' "$REMOTE_DIR"
          } > /tmp/perm.sftp
          sshpass -e sftp -P "$SFTP_PORT" -oStrictHostKeyChecking=no -oBatchMode=no -b /tmp/perm.sftp "$SFTP_USER@$SFTP_HOST" || true

      - name: Probe docroot candidates (temporary)
        if: ${{ env.FTP_SERVER != '' }}
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
          SFTP_HOST: ${{ secrets.FTP_SERVER }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PORT: ${{ vars.SFTP_PORT }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y sshpass >/dev/null
          echo A > A.txt; echo B > B.txt; echo C > C.txt
          {
            printf -- '-mkdir html/html\n'
            printf -- '-mkdir html/html/yttomp3.kentser.com\n'
            printf -- 'put A.txt html/html/yttomp3.kentser.com/probe-A.txt\n'
            printf -- 'chmod 755 html/html\n'
            printf -- 'chmod 755 html/html/yttomp3.kentser.com\n'
            printf -- 'chmod 644 html/html/yttomp3.kentser.com/probe-A.txt\n'
            printf -- '-mkdir yttomp3.kentser.com\n'
            printf -- 'put B.txt yttomp3.kentser.com/probe-B.txt\n'
            printf -- 'chmod 755 yttomp3.kentser.com\n'
            printf -- 'chmod 644 yttomp3.kentser.com/probe-B.txt\n'
            printf -- '-mkdir html/yttomp3\n'
            printf -- 'put C.txt html/yttomp3/probe-C.txt\n'
            printf -- 'chmod 755 html/yttomp3\n'
            printf -- 'chmod 644 html/yttomp3/probe-C.txt\n'
          } > /tmp/probe.sftp
          sshpass -e sftp -P "$SFTP_PORT" -oStrictHostKeyChecking=no -oBatchMode=no -b /tmp/probe.sftp "$SFTP_USER@$SFTP_HOST" || true
