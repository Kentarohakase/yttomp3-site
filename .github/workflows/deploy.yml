name: Deploy to easyname (SFTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sftp-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Mapped here so the deploy steps skip themselves until the secrets are set.
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site files
        if: ${{ env.FTP_SERVER != '' }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y librsvg2-bin >/dev/null
          mkdir -p _site
          cp index.html favicon.svg robots.txt _site/
          rsvg-convert og-image.svg -o _site/og-image.png

      - name: Ensure remote directory exists
        if: ${{ env.FTP_SERVER != '' }}
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
          SFTP_HOST: ${{ secrets.FTP_SERVER }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PORT: ${{ vars.SFTP_PORT }}
          REMOTE_DIR: ${{ vars.FTP_SERVER_DIR }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y sshpass >/dev/null
          printf -- '-mkdir %s\n' "$REMOTE_DIR" > /tmp/mk.sftp
          sshpass -e sftp -P "$SFTP_PORT" -oStrictHostKeyChecking=no -oBatchMode=no -b /tmp/mk.sftp "$SFTP_USER@$SFTP_HOST" || true

      - name: Deploy via SFTP
        if: ${{ env.FTP_SERVER != '' }}
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ vars.SFTP_PORT || '22' }}
          local_path: './_site/*'
          remote_path: ${{ vars.FTP_SERVER_DIR || '.' }}
          sftp_only: true

      - name: Fix remote permissions
        if: ${{ env.FTP_SERVER != '' }}
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
          SFTP_HOST: ${{ secrets.FTP_SERVER }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PORT: ${{ vars.SFTP_PORT }}
          REMOTE_DIR: ${{ vars.FTP_SERVER_DIR }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y sshpass >/dev/null
          # The webserver (www-data) must be able to traverse the dir and read the files.
          {
            printf -- '-chmod 755 %s\n' "$REMOTE_DIR"
            for f in index.html favicon.svg robots.txt og-image.png; do
              printf -- '-chmod 644 %s/%s\n' "$REMOTE_DIR" "$f"
            done
          } > /tmp/perm.sftp
          sshpass -e sftp -P "$SFTP_PORT" -oStrictHostKeyChecking=no -oBatchMode=no -b /tmp/perm.sftp "$SFTP_USER@$SFTP_HOST" || true
